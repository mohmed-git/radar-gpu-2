<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}
header{background:#1a1a2e;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
header h1{font-size:18px;font-weight:600}
.badge{background:#76b900;color:#fff;padding:3px 10px;border-radius:20px;font-size:12px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 24px;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10}
.toolbar input{height:34px;padding:0 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;width:200px}
.toolbar select{height:34px;padding:0 8px;border:1px solid #ccc;border-radius:6px;font-size:13px}
.btn{height:34px;padding:0 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap}
.btn-green{background:#76b900;color:#fff}.btn-green:hover{background:#639900}
.btn-blue{background:#0071c5;color:#fff}.btn-blue:hover{background:#005fa0}
.btn-red{background:#cc3333;color:#fff}.btn-red:hover{background:#aa2222}
.btn-gray{background:#e0e0e0;color:#333}.btn-gray:hover{background:#ccc}
.count{font-size:13px;color:#666;margin-right:auto}
table{width:100%;border-collapse:collapse;background:#fff}
th{background:#1a1a2e;color:#fff;padding:9px 10px;text-align:right;font-weight:500;font-size:12px;white-space:nowrap;position:sticky;top:57px;z-index:5}
td{padding:6px 10px;border-bottom:1px solid #eee;vertical-align:middle}
tr:hover td{background:#f9fffe}
tr.changed td{background:#fffbe6}
.brand-n{color:#76b900;font-weight:600}
.brand-a{color:#cc3333;font-weight:600}
.brand-i{color:#0071c5;font-weight:600}
.tier-pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:500}
.t-flagship{background:#ffeaea;color:#a00}
.t-high-end{background:#fff3e0;color:#b35a00}
.t-mid-range{background:#e8f5e9;color:#1b5e20}
.t-budget{background:#e3f2fd;color:#0d47a1}
.t-entry{background:#f3e5f5;color:#4a148c}
input.price-input{width:80px;height:28px;padding:0 6px;border:1px solid #ccc;border-radius:4px;font-size:13px;text-align:center}
input.price-input:focus{border-color:#76b900;outline:none;background:#fffde7}
input.price-input.changed{border-color:#f59e0b;background:#fffbe6}
.series-cell{font-size:11px;color:#888;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.change-pct{font-size:12px;font-weight:600}
.up{color:#1b5e20}.down{color:#cc0000}.flat{color:#888}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;display:none;z-index:999}
</style>
</head>
<body>

<header>
  <div>
    <h1>🖥️ GPU Radar — لوحة تعديل الأسعار</h1>
    <div style="font-size:12px;opacity:.7;margin-top:3px">عدّل الأسعار ثم صدّر data.js المحدّث</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span class="badge" id="changed-count">0 تعديل</span>
    <button class="btn btn-green" onclick="exportDataJS()">⬇ تصدير data.js</button>
    <button class="btn btn-blue" onclick="exportCSV()">⬇ تصدير CSV</button>
    <button class="btn btn-gray" onclick="resetAll()">↩ إعادة تعيين</button>
  </div>
</header>

<div class="toolbar">

    <option value="AMD">AMD</option>
    <option value="Intel">Intel</option>

    <option value="GPU">GPU فقط</option>
    <option value="CPU">CPU فقط</option>

    <option value="high-end">High-End</option>
    <option value="mid-range">Mid-Range</option>
    <option value="budget">Budget</option>
    <option value="entry">Entry</option>
  </select>
  <label style="font-size:13px;display:flex;align-items:center;gap:4px;cursor:pointer">
    <input type="checkbox" id="fChanged" onchange="render()"> المعدّلة فقط
  </label>
  <span class="count" id="count-label">102 قطعة</span>
</div>

<script>
let original = JSON.parse(JSON.stringify(ITEMS));
let current  = JSON.parse(JSON.stringify(ITEMS));
let changedIds = new Set();

function tierClass(t){ return 't-'+t; }
function brandClass(b){ return b==='NVIDIA'?'brand-n':b==='AMD'?'brand-a':'brand-i'; }

function calcChange(price, prev){
  if(!prev) return {pct:0,cls:'flat',arrow:'—'};
  const pct = ((price-prev)/prev*100).toFixed(1);
  if(price>prev) return {pct,cls:'up',arrow:'▲'};
  if(price<prev) return {pct,cls:'down',arrow:'▼'};
  return {pct:0,cls:'flat',arrow:'—'};
}

function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const fb = document.getElementById('fBrand').value;
  const ft = document.getElementById('fType').value;
  const fti = document.getElementById('fTier').value;
  const fc = document.getElementById('fChanged').checked;

  let list = current.filter(item=>{
    if(q && !item.name.toLowerCase().includes(q) && !item.id.includes(q)) return false;
    if(fb && item.brand!==fb) return false;
    if(ft && item.type!==ft) return false;
    if(fti && item.tier!==fti) return false;
    if(fc && !changedIds.has(item.id)) return false;
    return true;
  });

  document.getElementById('count-label').textContent = list.length + ' قطعة';

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = list.map((item,i)=>{
    const ch = calcChange(item.price, item.prev);
    const isChanged = changedIds.has(item.id);
    const tierC = tierClass(item.tier);
    return `<tr id="row-${item.id}" class="${isChanged?'changed':''}">
      <td style="color:#aaa;font-size:12px">${i+1}</td>
      <td style="font-weight:600">${item.name}</td>
      <td><span class="${brandClass(item.brand)}">${item.brand}</span></td>
      <td>${item.type}</td>
      <td><span class="tier-pill ${tierC}">${item.tier}</span></td>
      <td><input class="price-input${isChanged?' changed':''}" type="number" value="${item.price}" min="1" onchange="updateField('${item.id}','price',this.value,this)" oninput="updateField('${item.id}','price',this.value,this)"></td>
      <td><input class="price-input${isChanged?' changed':''}" type="number" value="${item.prev}" min="1" onchange="updateField('${item.id}','prev',this.value,this)" oninput="updateField('${item.id}','prev',this.value,this)"></td>
      <td><input class="price-input${isChanged?' changed':''}" type="number" value="${item.high52}" min="1" onchange="updateField('${item.id}','high52',this.value,this)" oninput="updateField('${item.id}','high52',this.value,this)"></td>
      <td><input class="price-input${isChanged?' changed':''}" type="number" value="${item.low52}" min="1" onchange="updateField('${item.id}','low52',this.value,this)" oninput="updateField('${item.id}','low52',this.value,this)"></td>
      <td><span class="change-pct ${ch.cls}">${ch.arrow} ${Math.abs(ch.pct)}%</span></td>
      <td class="series-cell" title="${item.series.join(',')}">📊 ${item.series.join(', ')}</td>
    </tr>`;
  }).join('');
}

function updateField(id, field, val, el){
  const n = parseInt(val);
  if(isNaN(n)||n<1) return;
  const item = current.find(x=>x.id===id);
  if(!item) return;
  item[field] = n;
  const orig = original.find(x=>x.id===id);
  const isDiff = ['price','prev','high52','low52'].some(f=>item[f]!==orig[f]);
  if(isDiff){ changedIds.add(id); el.classList.add('changed'); }
  else { changedIds.delete(id); el.classList.remove('changed'); }
  document.getElementById('row-'+id).className = isDiff?'changed':'';
  document.getElementById('changed-count').textContent = changedIds.size + ' تعديل';
}

function exportDataJS(){
  // Build updated data.js lines
  let lines = [];
  lines.push(`// GPU RADAR — Shared Data Layer  v3.1`);
  lines.push(`// آخر تحديث يدوي: ${new Date().toLocaleDateString('ar-SA')}`);
  lines.push(`\nconst MONTHS_AR = ['أبر','مايو','يون','يول','أغس','سبت','أكت','نوف','ديس','يناير','فبر','مارس'];\n`);

  const gpus = current.filter(x=>x.type==='GPU');
  const cpus = current.filter(x=>x.type==='CPU');

  lines.push(`const GPU_DATA = [`);
  gpus.forEach(item=>{
    const colorMap = {NVIDIA:'#76B900',AMD:'#ED1C24',Intel:'#0071C5'};
    const c = colorMap[item.brand]||'#888';
    lines.push(`  { id:'${item.id}', name:'${item.name}', brand:'${item.brand}', type:'GPU', tier:'${item.tier}', price:${item.price}, prev:${item.prev}, high52:${item.high52}, low52:${item.low52}, color:'${c}', series:[${item.series.join(',')}] },`);
  });
  lines.push(`];\n`);
  lines.push(`const CPU_DATA = [`);
  cpus.forEach(item=>{
    const colorMap = {Intel:'#0071C5',AMD:'#ED1C24'};
    const c = colorMap[item.brand]||'#888';
    lines.push(`  { id:'${item.id}', name:'${item.name}', brand:'${item.brand}', type:'CPU', tier:'${item.tier}', price:${item.price}, prev:${item.prev}, high52:${item.high52}, low52:${item.low52}, color:'${c}', series:[${item.series.join(',')}] },`);
  });
  lines.push(`];\n`);
  lines.push(`const ALL_DATA = [...GPU_DATA, ...CPU_DATA];`);

  const blob = new Blob([lines.join('\n')], {type:'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.js';
  a.click();
  toast('✅ تم تصدير data.js — ضعه في مجلد /js/');
}

function exportCSV(){
  const rows = [['id','name','brand','type','tier','price','prev','high52','low52','series']];
  current.forEach(item=>{
    rows.push([item.id, item.name, item.brand, item.type, item.tier,
               item.price, item.prev, item.high52, item.low52,
               '"'+item.series.join(',')+'"']);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gpu_cpu_prices.csv';
  a.click();
  toast('✅ تم تصدير CSV');
}

function resetAll(){
  if(!confirm('إعادة تعيين جميع التعديلات؟')) return;
  current = JSON.parse(JSON.stringify(original));
  changedIds.clear();
  document.getElementById('changed-count').textContent = '0 تعديل';
  render();
  toast('↩ تم إعادة التعيين');
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 3000);
}

render();
</script>
